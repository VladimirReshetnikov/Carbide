<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>carbide-multishell — pwsh + cmd + bash in one browser session</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; background: #111; color: #ddd; font: 14px/1.4 system-ui, sans-serif; }
    header { padding: 12px 16px; border-bottom: 1px solid #333; display: flex; gap: 16px; align-items: baseline; }
    header h1 { font-size: 16px; margin: 0; color: #7cc; }
    header .sub { color: #888; font-size: 12px; }
    header .hint { color: #666; font-size: 11px; font-family: ui-monospace, monospace; }
    header .status { margin-left: auto; color: #aaa; font-size: 12px; font-family: ui-monospace, monospace; }
    header .status[data-state="ready"] { color: #7c7; }
    header .status[data-state="error"] { color: #e77; }
    #term { height: calc(100vh - 48px); padding: 8px; }
    .xterm-viewport::-webkit-scrollbar { width: 10px; }
    .xterm-viewport::-webkit-scrollbar-thumb { background: #333; }
  </style>
</head>
<body>
  <header>
    <h1>carbide-multishell</h1>
    <span class="sub">pwsh / cmd / bash — shared VFS, env, and dispatcher</span>
    <span class="hint">try: <code>cmd</code> · <code>bash</code> · <code>ls /usr/bin</code> · <code>exit</code></span>
    <span id="status" class="status" data-state="init">booting&hellip;</span>
  </header>
  <div id="term"></div>

  <script type="module">
    import { Terminal } from "https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/+esm";
    import { FitAddon } from "https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/+esm";
    import { CarbideSession, BrowserHostAdapter } from "/packages/core/dist/index.js";

    const statusEl = document.getElementById("status");
    const setStatus = (text, state) => {
      statusEl.textContent = text;
      if (state) statusEl.dataset.state = state;
    };

    const term = new Terminal({
      fontFamily: 'ui-monospace, "SF Mono", Menlo, Consolas, monospace',
      fontSize: 13,
      theme: {
        background: "#111",
        foreground: "#ddd",
        cursor: "#7cc",
      },
      convertEol: true,
      scrollback: 10000,
    });
    const fit = new FitAddon();
    term.loadAddon(fit);
    term.open(document.getElementById("term"));
    fit.fit();
    window.addEventListener("resize", () => fit.fit());
    window.__term = term;
    window.__dumpBuffer = () => {
      const b = term.buffer.active;
      const out = [];
      for (let y = 0; y < b.length; y++) {
        out.push(b.getLine(y)?.translateToString(true) ?? "");
      }
      return out.join("\n");
    };

    // Per-package source lists. The Carbide harness compiles all four trees into a single
    // in-browser assembly alongside the multishell entry point; Roslyn resolves cross-
    // package references naturally because we flatten them into one project.
    const SHELL_CORE_SOURCES = [
      "src/Errors/ShellException.cs",
      "src/Vfs/VfsPath.cs",
      "src/Vfs/VfsNode.cs",
      "src/Vfs/VirtualFileSystem.cs",
      "src/Vfs/VfsSnapshot.cs",
      "src/Apps/AppRegistry.cs",
      "src/Apps/StubInstaller.cs",
      "src/Env/EnvVarStore.cs",
      "src/Dispatch/IShellKernel.cs",
      "src/Dispatch/ShellExecutionContext.cs",
      "src/Dispatch/ShellDispatcher.cs",
      "src/Io/ShellArgTokenizer.cs",
    ];

    const PWSH_SOURCES = [
      "src/Errors/SourceLocation.cs",
      "src/Errors/PwshException.cs",
      "src/Lexer/TokenKind.cs",
      "src/Lexer/Token.cs",
      "src/Lexer/Lexer.cs",
      "src/Parser/Ast/AstNode.cs",
      "src/Parser/Ast/AstNodes.cs",
      "src/Parser/Ast/ControlFlowNodes.cs",
      "src/Parser/Ast/FunctionNodes.cs",
      "src/Parser/Ast/ErrorNodes.cs",
      "src/Parser/Ast/ClassEnumNodes.cs",
      "src/Parser/Parser.cs",
      "src/Runtime/Scope.cs",
      "src/Runtime/Coercion.cs",
      "src/Runtime/Operators.cs",
      "src/Runtime/TypeAliases.cs",
      "src/Runtime/TypeBridge.cs",
      "src/Runtime/Interpreter.cs",
      "src/Runtime/ScriptBlock.cs",
      "src/Runtime/LoopControl.cs",
      "src/Runtime/ErrorRecord.cs",
      "src/Runtime/ScriptFunction.cs",
      "src/Runtime/FunctionRegistry.cs",
      "src/Runtime/RuntimeClass.cs",
      "src/Runtime/RuntimeEnum.cs",
      "src/Runtime/Providers.cs",
      "src/Cmdlets/Cmdlet.cs",
      "src/Cmdlets/ParameterBinding.cs",
      "src/Cmdlets/CmdletRegistry.cs",
      "src/Cmdlets/Pipeline.cs",
      "src/Cmdlets/Output/WriteOutputCommand.cs",
      "src/Cmdlets/Output/WriteHostCommand.cs",
      "src/Cmdlets/Output/WriteErrorCommand.cs",
      "src/Cmdlets/Output/OutStringCommand.cs",
      "src/Cmdlets/Output/ReadHostCommand.cs",
      "src/Cmdlets/Shape/WhereObjectCommand.cs",
      "src/Cmdlets/Shape/ForEachObjectCommand.cs",
      "src/Cmdlets/Shape/SelectObjectCommand.cs",
      "src/Cmdlets/Shape/SortObjectCommand.cs",
      "src/Cmdlets/Shape/GroupObjectCommand.cs",
      "src/Cmdlets/Shape/MeasureObjectCommand.cs",
      "src/Cmdlets/Json/ConvertToJsonCommand.cs",
      "src/Cmdlets/Json/ConvertFromJsonCommand.cs",
      "src/Cmdlets/Fs/GetChildItemCommand.cs",
      "src/Cmdlets/Fs/GetContentCommand.cs",
      "src/Cmdlets/Fs/SetContentCommand.cs",
      "src/Cmdlets/Fs/AddContentCommand.cs",
      "src/Cmdlets/Fs/NewItemCommand.cs",
      "src/Cmdlets/Fs/RemoveItemCommand.cs",
      "src/Cmdlets/Fs/TestPathCommand.cs",
      "src/Cmdlets/Fs/LocationCommands.cs",
      "src/Cmdlets/Fs/ItemCommands.cs",
      "src/Cmdlets/Fs/CopyMoveCommands.cs",
      "src/Cmdlets/Sys/SystemCommands.cs",
      "src/Cmdlets/App/AppCommands.cs",
      "src/Cmdlets/Shell/CrossShellCommands.cs",
      "src/Host/Banner.cs",
      "src/Host/OutputFormatter.cs",
      "src/Host/PwshKernel.cs",
      "src/Host/ShellHost.cs",
    ];

    const CMD_SOURCES = [
      "src/Errors/CmdException.cs",
      "src/Lexer/TokenKind.cs",
      "src/Lexer/Token.cs",
      "src/Lexer/Lexer.cs",
      "src/Parser/Ast.cs",
      "src/Parser/Parser.cs",
      "src/Runtime/VarExpander.cs",
      "src/Runtime/VfsTextWriter.cs",
      "src/Runtime/CrossShellLauncher.cs",
      "src/Runtime/Interpreter.cs",
      "src/Builtins/BuiltinRegistry.cs",
      "src/Builtins/IntExpression.cs",
      "src/Builtins/Builtins.cs",
      "src/Host/Banner.cs",
      "src/Host/CmdKernel.cs",
      "src/Host/ShellHost.cs",
    ];

    const BASH_SOURCES = [
      "src/Errors/BashException.cs",
      "src/Lexer/TokenKind.cs",
      "src/Lexer/Token.cs",
      "src/Lexer/BashLexer.cs",
      "src/Parser/Ast.cs",
      "src/Parser/BashParser.cs",
      "src/Runtime/ArithmeticEvaluator.cs",
      "src/Runtime/BraceExpansion.cs",
      "src/Runtime/CrossShellLauncher.cs",
      "src/Runtime/Expansion.cs",
      "src/Runtime/Globbing.cs",
      "src/Runtime/VfsTextWriter.cs",
      "src/Runtime/Interpreter.cs",
      "src/Builtins/BashTest.cs",
      "src/Builtins/BuiltinRegistry.cs",
      "src/Builtins/Builtins.cs",
      "src/Host/Banner.cs",
      "src/Host/BashKernel.cs",
      "src/Host/ShellHost.cs",
    ];

    const MULTISHELL_SOURCES = [
      "src/MultishellSession.cs",
      "src/Program.cs",
    ];

    async function loadSources() {
      const fetchOne = async (pkg, rel) => {
        const r = await fetch(`/packages/${pkg}/${rel}`);
        if (!r.ok) throw new Error(`failed to fetch ${pkg}/${rel}: HTTP ${r.status}`);
        return [`${pkg}/${rel.replace(/^src\//, "")}`, await r.text()];
      };
      const batches = [
        ["carbide-shell-core", SHELL_CORE_SOURCES],
        ["carbide-pwsh", PWSH_SOURCES],
        ["carbide-cmd", CMD_SOURCES],
        ["carbide-bash", BASH_SOURCES],
        ["carbide-multishell", MULTISHELL_SOURCES],
      ];
      const jobs = [];
      for (const [pkg, list] of batches) {
        for (const rel of list) jobs.push(fetchOne(pkg, rel));
      }
      return Promise.all(jobs);
    }

    async function main() {
      setStatus("initialising Carbide session\u2026");
      const adapter = new BrowserHostAdapter({
        frameworkAssetsBaseUrl: new URL(
          "/packages/core/src/bin/Release/net10.0/publish/wwwroot/_framework/",
          window.location.origin,
        ).toString(),
      });
      const session = await CarbideSession.initializeAsync({ hostAdapter: adapter });

      setStatus("compiling carbide-multishell\u2026");
      const project = session.createProject();
      const sources = await loadSources();
      for (const [name, body] of sources) {
        project.addSource(name, body);
      }

      setStatus("running", "ready");
      const handle = project.runInteractive({ terminal: term, stderrStyle: "red" });
      const result = await handle.exitPromise;
      setStatus(result.success ? `exit \u2713` : `exit \u2717 (${result.exitCode ?? "?"})`, result.success ? "ready" : "error");
      await session.shutdown();
    }

    main().catch((err) => {
      console.error(err);
      setStatus(`error: ${err.message ?? err}`, "error");
      term.write(`\r\n\x1b[31mbootstrap failed: ${String(err?.stack ?? err)}\x1b[0m\r\n`);
    });
  </script>
</body>
</html>
