<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carbide interactive: mid-run dispose() resolves exitPromise</title>
</head>
<body>
  <pre id="result">pending</pre>
  <script type="module">
    // Regression fixture for review R1 C3 / R2 §2: a program that blocks inside
    // `Console.In.ReadLineAsync()` must unblock when `session.dispose()` is called, and
    // `session.exitPromise` must resolve in a bounded time afterwards. Before the fix the
    // C# side's `DisposeInteractive` was a no-op, so dispose() detached the JS bridge
    // without signalling the pending read — `exitPromise` hung indefinitely.
    import { CarbideSession, BrowserHostAdapter } from "/dist/index.js";

    const resultEl = document.getElementById("result");
    resultEl.dataset.status = "module-imported";

    function makeInteractiveTerminal() {
      const chunks = [];
      const listeners = new Set();
      return {
        cols: 80, rows: 24,
        write(data) { chunks.push(typeof data === "string" ? data : new TextDecoder().decode(data)); },
        onData(cb) { listeners.add(cb); return { dispose() { listeners.delete(cb); } }; },
        deliverKeys(s) { for (const cb of Array.from(listeners)) cb(s); },
        getFullText() { return chunks.join(""); },
      };
    }

    async function run() {
      const adapter = new BrowserHostAdapter({
        frameworkAssetsBaseUrl: new URL(
          "/src/bin/Release/net10.0/publish/wwwroot/_framework/",
          window.location.origin,
        ).toString(),
      });
      const terminal = makeInteractiveTerminal();
      const session = await CarbideSession.initializeAsync({ hostAdapter: adapter });
      try {
        const project = session.createProject();
        // Block on ReadLineAsync. If dispose() completes the reader with EOF (returns
        // null), the program exits via the `line is null` branch with "disposed" on
        // stdout. That's the pass signal.
        project.addSource("Program.cs", [
          'using System;',
          'using System.Threading.Tasks;',
          'Console.WriteLine("ready");',
          'string? line = await Console.In.ReadLineAsync();',
          'if (line is null) {',
          '    Console.WriteLine("disposed");',
          '} else {',
          '    Console.WriteLine("got: " + line);',
          '}',
          '',
        ].join("\n"));

        const handle = project.runInteractive({ terminal });

        // Wait for "ready\n" to know the program has reached the ReadLineAsync await.
        const start = Date.now();
        while (!terminal.getFullText().includes("ready\n")) {
          if (Date.now() - start > 30_000) throw new Error("timeout waiting for ready");
          await new Promise((r) => setTimeout(r, 50));
        }

        // Program is blocked on ReadLineAsync. Kick off dispose WITHOUT delivering any
        // keys. The pre-fix behaviour hung exitPromise forever; the fixed behaviour:
        //  1. session.dispose() calls interop.DisposeTerminal
        //  2. C# completes the BrowserTerminalReader -> ReadLineAsync returns null
        //  3. User program writes "disposed" and exits
        //  4. exitPromise resolves with success
        const t0 = Date.now();
        const disposePromise = handle.dispose();
        const runResult = await handle.exitPromise;
        const disposeWaitMs = Date.now() - t0;
        await disposePromise;

        return {
          runResult,
          fullText: terminal.getFullText(),
          disposeWaitMs,
        };
      } finally {
        await session.shutdown();
      }
    }

    window.addEventListener("error", (e) => {
      if (resultEl.dataset.status === "module-imported" || resultEl.dataset.status == null) {
        resultEl.textContent = "UNCAUGHT: " + e.message;
        resultEl.dataset.status = "error";
      }
    });
    window.addEventListener("unhandledrejection", (e) => {
      if (resultEl.dataset.status === "module-imported" || resultEl.dataset.status == null) {
        const reason = e.reason;
        resultEl.textContent = "UNHANDLED: " + (reason?.stack ?? reason);
        resultEl.dataset.status = "error";
      }
    });

    run()
      .then((payload) => {
        resultEl.textContent = JSON.stringify(payload);
        resultEl.dataset.status = payload.runResult.success ? "ok" : "fail";
      })
      .catch((err) => {
        resultEl.textContent = "ERR: " + (err?.stack ?? err);
        resultEl.dataset.status = "error";
      });
  </script>
</body>
</html>
