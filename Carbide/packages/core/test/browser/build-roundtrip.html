<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carbide browser smoke — build round-trip</title>
</head>
<body>
  <pre id="result">pending</pre>
  <script type="module">
    import { CarbideSession, BrowserHostAdapter } from "/dist/index.js";

    const resultEl = document.getElementById("result");

    window.addEventListener("error", (e) => {
      if (resultEl.dataset.status == null) {
        resultEl.textContent = "UNCAUGHT: " + e.message;
        resultEl.dataset.status = "error";
      }
    });
    window.addEventListener("unhandledrejection", (e) => {
      if (resultEl.dataset.status == null) {
        const reason = e.reason;
        resultEl.textContent = "UNHANDLED: " + (reason?.stack ?? reason);
        resultEl.dataset.status = "error";
      }
    });

    async function run() {
      const adapter = new BrowserHostAdapter({
        frameworkAssetsBaseUrl: new URL(
          "/src/bin/Release/net10.0/publish/wwwroot/_framework/",
          window.location.origin,
        ).toString(),
      });
      const session = await CarbideSession.initializeAsync({ hostAdapter: adapter });
      try {
        // Stage 1: build MyLib.
        const lib = session.createProject({ assemblyName: "MyLib" });
        lib.addSource(
          "Thing.cs",
          `namespace MyLib; public static class Thing { public static string Describe(int v) => $"Thing<{v}>"; }`,
        );
        const libBuild = await lib.build();

        // Stage 2: reference MyLib's PE bytes and run a program that uses it.
        const libRef = session.addReference(libBuild.pe, "MyLib");
        const app = session.createProject({ assemblyName: "MyApp" });
        app.addReference(libRef);
        app.addSource(
          "Program.cs",
          `using MyLib; Console.WriteLine(Thing.Describe(42));`,
        );
        const runResult = await app.run();

        return {
          libSuccess: libBuild.success,
          libPeLen: libBuild.pe ? libBuild.pe.length : 0,
          libPdbLen: libBuild.pdb ? libBuild.pdb.length : 0,
          runSuccess: runResult.success,
          stdOut: runResult.stdOut,
        };
      } finally {
        await session.shutdown();
      }
    }

    run()
      .then((out) => {
        resultEl.textContent = JSON.stringify(out);
        const ok =
          out.libSuccess &&
          out.libPeLen > 0 &&
          out.libPdbLen > 0 &&
          out.runSuccess &&
          out.stdOut === "Thing<42>\n";
        resultEl.dataset.status = ok ? "ok" : "fail";
      })
      .catch((err) => {
        resultEl.textContent = "ERR: " + (err?.stack ?? err);
        resultEl.dataset.status = "error";
      });
  </script>
</body>
</html>
