<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carbide browser smoke — user reference</title>
</head>
<body>
  <pre id="result">pending</pre>
  <script type="module">
    import { CarbideSession, BrowserHostAdapter } from "/dist/index.js";

    const resultEl = document.getElementById("result");

    window.addEventListener("error", (e) => {
      if (resultEl.dataset.status == null) {
        resultEl.textContent = "UNCAUGHT: " + e.message;
        resultEl.dataset.status = "error";
      }
    });
    window.addEventListener("unhandledrejection", (e) => {
      if (resultEl.dataset.status == null) {
        const reason = e.reason;
        resultEl.textContent = "UNHANDLED: " + (reason?.stack ?? reason);
        resultEl.dataset.status = "error";
      }
    });

    async function run() {
      const adapter = new BrowserHostAdapter({
        frameworkAssetsBaseUrl: new URL(
          "/src/bin/Release/net10.0/publish/wwwroot/_framework/",
          window.location.origin,
        ).toString(),
      });
      const session = await CarbideSession.initializeAsync({ hostAdapter: adapter });
      try {
        const helperUrl = new URL(
          "/test/fixtures/helper-dll/MyHelper.dll",
          window.location.origin,
        );
        const helperResp = await fetch(helperUrl);
        if (!helperResp.ok) {
          throw new Error(`Failed to fetch helper DLL: ${helperResp.status}`);
        }
        const helperBytes = new Uint8Array(await helperResp.arrayBuffer());

        const handle = session.addReference(helperBytes, "MyHelper");

        const project = session.createProject();
        project.addReference(handle);
        project.addSource(
          "Program.cs",
          `using MyHelper; Console.WriteLine(Thing.Describe(42));`,
        );
        const firstRun = await project.run();

        // Remove the reference; compilation should now error.
        session.removeReference(handle);
        const diagAfterRemove = await project.getDiagnostics();
        const removeBroke = diagAfterRemove.some((d) => d.severity === "error");

        return { firstRun, removeBroke, handleId: handle.id, disposed: handle.disposed };
      } finally {
        await session.shutdown();
      }
    }

    run()
      .then((out) => {
        resultEl.textContent = JSON.stringify(out);
        const ok =
          out.firstRun.success &&
          out.firstRun.stdOut === "Thing<42>\n" &&
          out.removeBroke &&
          out.disposed === true;
        resultEl.dataset.status = ok ? "ok" : "fail";
      })
      .catch((err) => {
        resultEl.textContent = "ERR: " + (err?.stack ?? err);
        resultEl.dataset.status = "error";
      });
  </script>
</body>
</html>
