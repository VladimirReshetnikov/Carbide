<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carbide interactive-terminal smoke: Console.OpenStandardOutput bypass closure</title>
</head>
<body>
  <pre id="result">pending</pre>
  <script type="module">
    import { CarbideSession, BrowserHostAdapter } from "/dist/index.js";

    const resultEl = document.getElementById("result");
    resultEl.dataset.status = "module-imported";

    // Mirror the other T1 fixtures — record every write on a lightweight mock.
    function makeMockTerminal() {
      const chunks = [];
      return {
        write(data) {
          chunks.push(typeof data === "string" ? data : new TextDecoder().decode(data));
        },
        getFullText() { return chunks.join(""); },
      };
    }

    async function run() {
      const adapter = new BrowserHostAdapter({
        frameworkAssetsBaseUrl: new URL(
          "/src/bin/Release/net10.0/publish/wwwroot/_framework/",
          window.location.origin,
        ).toString(),
      });
      const terminal = makeMockTerminal();
      const session = await CarbideSession.initializeAsync({ hostAdapter: adapter });
      try {
        const project = session.createProject();
        // Drive the handle-level stdout stream directly. Pre-T1, these bytes went to
        // console.log via emscripten's default `print`, bypassing Console.SetOut entirely.
        // T1's `print`/`printErr` overlay on BrowserHostAdapter routes them into the active
        // terminal's sink instead, so they show up in the mock alongside Console.Write output.
        project.addSource(
          "Program.cs",
          'using System.Text;\n' +
            'Console.Write("via-setout ");\n' +
            'using var raw = Console.OpenStandardOutput();\n' +
            'var bytes = Encoding.UTF8.GetBytes("via-openstdout\\n");\n' +
            'raw.Write(bytes, 0, bytes.Length);\n' +
            'raw.Flush();\n',
        );
        const handle = project.runInteractive({ terminal });
        const runResult = await handle.exitPromise;
        return {
          runResult,
          fullText: terminal.getFullText(),
        };
      } finally {
        await session.shutdown();
      }
    }

    window.addEventListener("error", (e) => {
      if (resultEl.dataset.status === "module-imported" || resultEl.dataset.status == null) {
        resultEl.textContent = "UNCAUGHT: " + e.message;
        resultEl.dataset.status = "error";
      }
    });
    window.addEventListener("unhandledrejection", (e) => {
      if (resultEl.dataset.status === "module-imported" || resultEl.dataset.status == null) {
        const reason = e.reason;
        resultEl.textContent = "UNHANDLED: " + (reason?.stack ?? reason);
        resultEl.dataset.status = "error";
      }
    });

    run()
      .then((payload) => {
        resultEl.textContent = JSON.stringify(payload);
        resultEl.dataset.status = payload.runResult.success ? "ok" : "fail";
      })
      .catch((err) => {
        resultEl.textContent = "ERR: " + (err?.stack ?? err);
        resultEl.dataset.status = "error";
      });
  </script>
</body>
</html>
