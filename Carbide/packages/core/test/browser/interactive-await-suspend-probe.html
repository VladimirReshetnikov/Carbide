<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>T2.1 Option F probe — can an await that genuinely suspends complete?</title>
</head>
<body>
  <pre id="result">pending</pre>
  <script type="module">
    import { CarbideSession, BrowserHostAdapter } from "/dist/index.js";

    const resultEl = document.getElementById("result");

    window.addEventListener("error", (e) => {
      if (resultEl.dataset.status == null) {
        resultEl.textContent = "UNCAUGHT: " + e.message;
        resultEl.dataset.status = "error";
      }
    });
    window.addEventListener("unhandledrejection", (e) => {
      if (resultEl.dataset.status == null) {
        const reason = e.reason;
        resultEl.textContent = "UNHANDLED: " + (reason?.stack ?? reason);
        resultEl.dataset.status = "error";
      }
    });

    function makeMockTerminal() {
      const chunks = [];
      return {
        cols: 80, rows: 24,
        write(data) {
          chunks.push(typeof data === "string" ? data : new TextDecoder().decode(data));
        },
        getFullText() { return chunks.join(""); },
      };
    }

    async function run() {
      const adapter = new BrowserHostAdapter({
        frameworkAssetsBaseUrl: new URL(
          "/src/bin/Release/net10.0/publish/wwwroot/_framework/",
          window.location.origin,
        ).toString(),
      });
      const session = await CarbideSession.initializeAsync({ hostAdapter: adapter });
      const terminal = makeMockTerminal();
      try {
        const project = session.createProject();
        project.addSource(
          "Program.cs",
          `using System;
using System.Threading.Tasks;

Console.WriteLine("SC=" + (System.Threading.SynchronizationContext.Current?.GetType().Name ?? "<null>"));

Console.WriteLine("before delay");
try { await Task.Delay(50); Console.WriteLine("after delay OK"); }
catch (Exception ex) { Console.WriteLine("after delay FAILED: " + ex.GetType().Name + ": " + ex.Message); }

Console.WriteLine("before tcs-via-delay");
try {
    var tcs = new TaskCompletionSource<string>(TaskCreationOptions.None);
    _ = Task.Delay(50).ContinueWith(_ => tcs.TrySetResult("hello"));
    var v = await tcs.Task;
    Console.WriteLine("after tcs-via-delay OK: " + v);
}
catch (Exception ex) { Console.WriteLine("after tcs-via-delay FAILED: " + ex.GetType().Name + ": " + ex.Message); }

Console.WriteLine("done");
`,
        );
        const handle = project.runInteractive({ terminal });
        const result = await handle.exitPromise;
        return { result, text: terminal.getFullText() };
      } finally {
        await session.shutdown();
      }
    }

    run()
      .then((payload) => {
        resultEl.textContent = JSON.stringify(payload);
        resultEl.dataset.status = payload.result.success ? "ok" : "fail";
      })
      .catch((err) => {
        resultEl.textContent = "ERR: " + (err?.stack ?? err);
        resultEl.dataset.status = "error";
      });
  </script>
</body>
</html>
