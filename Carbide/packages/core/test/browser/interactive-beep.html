<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carbide interactive-terminal smoke: Console.Beep + BeepAsync</title>
</head>
<body>
  <pre id="result">pending</pre>
  <script type="module">
    import { CarbideSession, BrowserHostAdapter } from "/dist/index.js";

    const resultEl = document.getElementById("result");
    resultEl.dataset.status = "module-imported";

    // Record every AudioContext operation the test triggers so the spec can assert on
    // what the program asked the Web Audio stack to do, independent of whether the
    // headless browser actually produced audible output (browser mute / CI noise-free
    // builds / autoplay policy all interfere with hearing real tones).
    window.__audioEvents = [];
    function wrapAudioContextForAssertion() {
      const NativeCtor = window.AudioContext ?? window.webkitAudioContext;
      if (!NativeCtor) return;
      class SpyAudioContext extends NativeCtor {
        constructor() {
          super();
          window.__audioEvents.push({ kind: "ctor", state: this.state });
        }
        createOscillator() {
          const osc = super.createOscillator();
          const origStart = osc.start.bind(osc);
          const origStop = osc.stop.bind(osc);
          osc.start = (when) => {
            window.__audioEvents.push({ kind: "start", when: when ?? this.currentTime, freq: osc.frequency.value, type: osc.type });
            return origStart(when);
          };
          osc.stop = (when) => {
            window.__audioEvents.push({ kind: "stop", when: when ?? this.currentTime });
            return origStop(when);
          };
          return osc;
        }
      }
      window.AudioContext = SpyAudioContext;
    }
    wrapAudioContextForAssertion();

    function makeInteractiveTerminal() {
      const chunks = [];
      const listeners = new Set();
      return {
        cols: 80,
        rows: 24,
        write(data) { chunks.push(typeof data === "string" ? data : new TextDecoder().decode(data)); },
        onData(cb) { listeners.add(cb); return { dispose() { listeners.delete(cb); } }; },
        deliverKeys(s) { for (const cb of Array.from(listeners)) cb(s); },
        getFullText() { return chunks.join(""); },
      };
    }

    async function run() {
      const adapter = new BrowserHostAdapter({
        frameworkAssetsBaseUrl: new URL(
          "/src/bin/Release/net10.0/publish/wwwroot/_framework/",
          window.location.origin,
        ).toString(),
      });
      const terminal = makeInteractiveTerminal();
      const session = await CarbideSession.initializeAsync({ hostAdapter: adapter });
      try {
        const project = session.createProject();
        project.addSource(
          "Program.cs",
          [
            "using System;",
            "using System.Threading.Tasks;",
            "using Carbide.Terminal;",
            "Console.WriteLine(\"beep: starting\");",
            // Stock fire-and-forget — returns immediately, tones queue in JS audio time.
            "Console.Beep(440, 100);",
            "Console.Beep(880, 100);",
            // Awaitable — the await completes only after the tone ends (audio-clock timed).
            "await CarbideConsole.BeepAsync(1320, 80);",
            "Console.WriteLine(\"beep: done\");",
            "",
          ].join("\n"),
        );
        const handle = project.runInteractive({ terminal });
        const runResult = await handle.exitPromise;
        return {
          runResult,
          fullText: terminal.getFullText(),
          audioEvents: window.__audioEvents,
        };
      } finally {
        await session.shutdown();
      }
    }

    window.addEventListener("error", (e) => {
      if (resultEl.dataset.status === "module-imported" || resultEl.dataset.status == null) {
        resultEl.textContent = "UNCAUGHT: " + e.message;
        resultEl.dataset.status = "error";
      }
    });
    window.addEventListener("unhandledrejection", (e) => {
      if (resultEl.dataset.status === "module-imported" || resultEl.dataset.status == null) {
        const reason = e.reason;
        resultEl.textContent = "UNHANDLED: " + (reason?.stack ?? reason);
        resultEl.dataset.status = "error";
      }
    });

    run()
      .then((payload) => {
        resultEl.textContent = JSON.stringify(payload);
        resultEl.dataset.status = payload.runResult.success ? "ok" : "fail";
      })
      .catch((err) => {
        resultEl.textContent = "ERR: " + (err?.stack ?? err);
        resultEl.dataset.status = "error";
      });
  </script>
</body>
</html>
